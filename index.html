<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>진진심 청소 관리</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
:root{
  --bg:#f5f4f0;--surface:#fff;--border:#e0ddd6;--text:#1a1a1a;--muted:#888;
  --f3:#d63031;--f4:#0984e3;--f3bg:#d63031;--f4bg:#0984e3;
  --both:#c8a96e;--ok:#27ae60;--err:#e74c3c;--warn:#e67e22;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:var(--text);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
header h1{font-size:16px;font-weight:700;}
.sync-btn{background:none;border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:inherit;}
.sync-btn:disabled{opacity:.5;}
@keyframes spin{to{transform:rotate(360deg);}}
.spinning{display:inline-block;animation:spin .8s linear infinite;}
.tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;overflow-x:auto;}
.tab{padding:13px 16px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;}
.tab.active{color:var(--text);border-bottom-color:var(--text);}
.container{padding:14px;max-width:900px;margin:0 auto;}
.month-nav{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border-radius:12px;padding:11px 16px;margin-bottom:12px;border:1px solid var(--border);}
.month-nav button{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 13px;cursor:pointer;font-size:14px;}
.month-nav h2{font-size:15px;font-weight:700;}
.sum-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.sum-card{background:var(--surface);border-radius:10px;padding:12px;border:1px solid var(--border);text-align:center;}
.sum-card .lbl{font-size:11px;color:var(--muted);margin-bottom:3px;}
.sum-card .val{font-size:20px;font-weight:700;}
.sum-card .sub{font-size:11px;color:var(--muted);margin-top:2px;}
.sync-bar{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 14px;margin-bottom:12px;font-size:12px;color:var(--muted);display:flex;justify-content:space-between;align-items:center;}
.dot{width:7px;height:7px;border-radius:50%;background:#ccc;display:inline-block;margin-right:5px;}
.dot.green{background:var(--ok);}
.dot.red{background:var(--err);}

/* ── 달력 ── */
.cal-wrap{background:var(--surface);border-radius:12px;border:1px solid var(--border);overflow:hidden;margin-bottom:12px;}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);background:#f8f7f3;border-bottom:1px solid var(--border);}
.cal-dow{text-align:center;padding:8px 4px;font-size:11px;font-weight:700;color:var(--muted);}
.cal-dow:first-child{color:var(--err);}
.cal-dow:last-child{color:var(--f4);}
.cal-week{display:grid;grid-template-columns:repeat(7,1fr);position:relative;border-bottom:.5px solid var(--border);}
.cal-week:last-child{border-bottom:none;}
.cal-cell{min-height:90px;border-right:.5px solid var(--border);padding:5px 5px 60px;position:relative;}
.cal-cell:last-child{border-right:none;}
.cal-cell.empty{background:#fafaf8;}
.cal-cell.today{background:#fffbf0;}
.cal-cell.has-checkout{cursor:pointer;}
.cal-cell.has-checkout:hover{background:#f5f4ec;}
.cal-cell.mijeong{background:#fffbf0;}
.day-num{font-size:12px;font-weight:500;line-height:1;margin-bottom:2px;position:relative;z-index:2;}
.cal-cell.empty .day-num{color:#ccc;}
.cal-cell:nth-child(7n+1) .day-num{color:var(--err);}
.cal-cell:last-child .day-num{color:var(--f4);}

/* ── 예약 바 ── */
.res-bar{position:absolute;height:18px;font-size:10px;font-weight:600;display:flex;align-items:center;padding:0 6px 0 6px;white-space:nowrap;z-index:2;color:#fff;overflow:hidden;}
.res-bar.f3-stay{background:#d63031;}
.res-bar.f4-stay{background:#0984e3;}
/* 청소일: 바 끝에 ★ 뱃지 */
.co-star{
  margin-left:auto;
  padding-left:5px;
  font-size:12px;
  flex-shrink:0;
  text-shadow:0 0 4px rgba(0,0,0,0.4);
}

.blk-badge{position:absolute;bottom:4px;left:4px;background:#fde8e8;color:#c0392b;font-size:9px;border-radius:3px;padding:1px 4px;z-index:4;}

/* ── 패널 ── */
.day-panel{background:var(--surface);border-radius:12px;border:1px solid var(--border);margin-bottom:12px;display:none;}
.day-panel.open{display:block;}
.ph{padding:12px 16px;background:var(--text);color:#fff;display:flex;justify-content:space-between;align-items:center;border-radius:12px 12px 0 0;}
.ph h3{font-size:14px;font-weight:700;}
.ph-close{background:none;border:none;color:rgba(255,255,255,.7);font-size:20px;cursor:pointer;}
.pb{padding:14px 16px;}
.fsec{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.fsec:last-of-type{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.ftitle{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.fb{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.fb.f3{background:#ffeaea;color:#d63031;}
.fb.f4{background:#e8f4ff;color:#0984e3;}
.slbl{font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500;}

.person-nation-row{display:flex;gap:8px;margin-bottom:10px;align-items:flex-start;}
.pgrid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;flex:1;}
.pbtn{padding:7px 3px;border:1.5px solid var(--border);border-radius:7px;background:#fff;cursor:pointer;font-size:11px;text-align:center;font-family:inherit;}
.pbtn.active{background:var(--both);border-color:var(--both);color:#fff;font-weight:700;}
.nation-btns{display:flex;flex-direction:column;gap:4px;min-width:52px;}
.nbtn{padding:6px 4px;border:1.5px solid var(--border);border-radius:7px;background:#fff;cursor:pointer;font-size:11px;text-align:center;font-family:inherit;}
.nbtn.active.foreign{background:#e8f4ff;border-color:#0984e3;color:#0984e3;font-weight:700;}
.nbtn.active.domestic{background:#fff3e0;border-color:var(--warn);color:var(--warn);font-weight:700;}

.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
.mbtn{padding:9px 8px;border:1.5px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;font-size:12px;font-family:inherit;text-align:center;position:relative;}
.mbtn.active{background:var(--text);border-color:var(--text);color:#fff;}
.mbtn.sug{border-color:var(--ok);background:#f0fbf4;color:#1a6b3a;}
.mbtn.unavail{opacity:.35;cursor:not-allowed;}
.mtag{position:absolute;top:-5px;right:-5px;background:var(--ok);color:#fff;font-size:9px;border-radius:4px;padding:1px 4px;}
.fee-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-top:6px;}
.fee-row span{color:var(--muted);}
.fee-row strong{font-size:15px;}

.laundry-sec{background:#f8f7f3;border-radius:10px;padding:12px;margin-top:8px;}
.laundry-title{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;}
.set-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.set-num{font-size:18px;font-weight:700;min-width:30px;text-align:center;}

.ksec{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.klbl{font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:500;}
.kbox{background:#fef9e7;border:1px solid #f9ca24;border-radius:10px;padding:12px;font-size:13px;line-height:1.8;white-space:pre-line;color:#333;min-height:320px;}
.kcopy{width:100%;background:#fee500;color:#333;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;font-family:inherit;}

/* ── 목록 탭 ── */
.month-section{margin-bottom:20px;}
.month-label{font-size:14px;font-weight:700;color:var(--text);margin-bottom:8px;padding:8px 12px;background:var(--surface);border-radius:8px;border:1px solid var(--border);}
.list-table{width:100%;background:var(--surface);border-radius:12px;border:1px solid var(--border);overflow:hidden;border-collapse:collapse;}
.list-table th{background:#f8f7f3;padding:8px 10px;font-size:11px;font-weight:700;color:var(--muted);text-align:center;border-bottom:1px solid var(--border);}
.list-table th:first-child{text-align:left;}
.list-table td{padding:9px 10px;font-size:12px;border-bottom:.5px solid var(--border);text-align:center;vertical-align:middle;}
.list-table td:first-child{text-align:left;font-weight:500;}
.list-table tr:last-child td{border-bottom:none;}
.list-table tr:hover td{background:#fafaf8;}
.list-table tr.has-both td{background:#fffbf0;}
.badge-o{color:#1a8a3a;font-size:16px;font-weight:900;}
.badge-x{color:#999;font-size:12px;font-weight:700;}
.mgr-cell{font-size:11px;color:var(--text);max-width:120px;}
.nation-tag{font-size:10px;padding:1px 5px;border-radius:4px;margin-left:3px;}
.nation-tag.f{background:#e8f4ff;color:#0984e3;}
.nation-tag.d{background:#fff3e0;color:var(--warn);}

/* ── 정산 탭 ── */
.settle-person-card{background:var(--surface);border-radius:12px;border:1px solid var(--border);overflow:hidden;}
.sp-head{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:#fafaf8;}
.sp-name{font-size:14px;font-weight:700;}
.sp-total{font-size:16px;font-weight:700;color:var(--ok);}
.sp-body{display:none;padding:10px 14px;border-top:1px solid var(--border);}
.sp-body.open{display:block;}
.sp-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:.5px solid #f5f5f5;}
.sp-row:last-child{border-bottom:none;}
.sp-row .sl{color:var(--muted);}
.pay-summary{background:var(--surface);border-radius:12px;border:2px solid var(--ok);padding:14px;margin-bottom:12px;}
.pay-summary-title{font-size:13px;font-weight:700;color:var(--ok);margin-bottom:10px;}
.pay-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:.5px solid #f0f0f0;font-size:13px;}
.pay-row:last-child{border-bottom:none;}
.pay-row .pname{font-weight:600;}
.pay-row .pamount{font-size:15px;font-weight:700;}
.pay-row .pdetail{font-size:11px;color:var(--muted);}
.copy-all-btn{width:100%;background:var(--ok);color:#fff;border:none;border-radius:8px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;margin-top:10px;font-family:inherit;}

.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty .ic{font-size:36px;margin-bottom:10px;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s;z-index:200;white-space:nowrap;}
.toast.show{opacity:1;}
.ov{display:none;position:fixed;inset:0;background:rgba(255,255,255,.88);z-index:300;flex-direction:column;align-items:center;justify-content:center;gap:12px;font-size:14px;color:var(--muted);}
.ov.show{display:flex;}
.ldr{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .8s linear infinite;}
.legend{display:flex;gap:12px;margin-bottom:10px;font-size:11px;color:var(--muted);flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:5px;}
.ldot{width:24px;height:12px;border-radius:2px;}
</style>
</head>
<body>
<header>
  <h1>진진심 청소 관리</h1>
  <div style="display:flex;gap:6px;">
    <button class="sync-btn" id="cloud-save-btn" onclick="cloudSave()">☁️ 저장</button>
    <button class="sync-btn" id="cloud-load-btn" onclick="cloudLoad()">☁️ 불러오기</button>
    <button class="sync-btn" id="sync-btn" onclick="syncAll()">🔄 동기화</button>
  </div>
</header>
<div class="tab-bar">
  <div class="tab active" onclick="switchTab('cal')">📅 달력</div>
  <div class="tab" onclick="switchTab('list')">📋 목록</div>
  <div class="tab" onclick="switchTab('settle')">💰 정산</div>
</div>

<div id="tab-cal" class="container">
  <div class="month-nav">
    <button onclick="changeMonth(-1)">◀</button>
    <h2 id="cal-title"></h2>
    <button onclick="changeMonth(1)">▶</button>
  </div>

  <div class="sync-bar">
    <div><span class="dot" id="sdot"></span><span id="stxt">동기화 전</span></div>
    <span id="stim"></span>
  </div>
  <div class="sum-row">
    <div class="sum-card"><div class="lbl">총 청소</div><div class="val" id="tc">0</div><div class="sub">건</div></div>
    <div class="sum-card"><div class="lbl">총 청소비</div><div class="val" id="tf">0</div><div class="sub">만원</div></div>
    <div class="sum-card"><div class="lbl">동시 청소</div><div class="val" id="bc">0</div><div class="sub">건</div></div>
  </div>
  <div style="display:flex;gap:6px;margin-bottom:10px;">
    <button id="view-month-btn" onclick="setCalView('month')" style="flex:1;padding:7px;border:1.5px solid var(--text);border-radius:8px;background:var(--text);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">월간</button>
    <button id="view-week-btn" onclick="setCalView('week')" style="flex:1;padding:7px;border:1.5px solid var(--border);border-radius:8px;background:#fff;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">주간</button>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="ldot" style="background:#d63031;border-radius:3px"></div>3층 숙박중</div>
    <div class="legend-item"><div class="ldot" style="background:#d63031;border-radius:3px;display:flex;align-items:center;justify-content:flex-end;padding-right:2px;font-size:9px;color:#fff">★</div>3층 청소일</div>
    <div class="legend-item"><div class="ldot" style="background:#0984e3;border-radius:3px"></div>4층 숙박중</div>
    <div class="legend-item"><div class="ldot" style="background:#0984e3;border-radius:3px;display:flex;align-items:center;justify-content:flex-end;padding-right:2px;font-size:9px;color:#fff">★</div>4층 청소일</div>
  </div>
  <div class="cal-wrap">
    <div class="cal-dow-row">
      <div class="cal-dow">일</div><div class="cal-dow">월</div><div class="cal-dow">화</div>
      <div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div><div class="cal-dow">토</div>
    </div>
    <div id="cal-body"></div>
  </div>
  <div class="day-panel" id="dpanel">
    <div class="ph"><h3 id="ptitle"></h3><button class="ph-close" onclick="closePanel()">✕</button></div>
    <div class="pb" id="pbody"></div>
  </div>
</div>

<div id="tab-list" class="container" style="display:none">
  <div id="list-body"></div>
</div>

<div id="tab-settle" class="container" style="display:none">
  <div class="month-nav">
    <button onclick="changeMonth(-1)">◀</button>
    <h2 id="set-t"></h2>
    <button onclick="changeMonth(1)">▶</button>
  </div>
  <!-- 주간/월간 탭 -->
  <div style="display:flex;gap:6px;margin-bottom:12px;">
    <button id="settle-month-btn" onclick="setSettleView('month')" style="flex:1;padding:8px;border:1.5px solid var(--text);border-radius:8px;background:var(--text);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">월간</button>
    <button id="settle-week-btn" onclick="setSettleView('week')" style="flex:1;padding:8px;border:1.5px solid var(--border);border-radius:8px;background:#fff;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">주간</button>
  </div>
  <!-- 매니저 탭 -->
  <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;" id="mgr-tabs"></div>
  <div id="month-expense-summary" style="background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:14px;margin-bottom:12px;"></div>
  <div class="pay-summary" id="pay-summary"></div>
  <div id="settle-detail"></div>
</div>

<div class="ov" id="ov"><div class="ldr"></div><span>동기화 중...</span></div>
<div class="toast" id="toast"></div>

<script>
const GAS='https://script.google.com/macros/s/AKfycbzZbCSIM5lrEsNttoh2ZQYyIDZ5KRM4DK4XunNLNKxHbFRNaqnrDbg6h4oVTeZwkVE5/exec';
const DAYS=['일','월','화','수','목','금','토'];
const FEE={1:40000,2:40000,3:40000,4:40000,5:40000,6:40000,7:40000,8:40000};
const MGR_NAMES={'박해성':'박해성 매니저님','김병섭':'김병섭 매니저님','김명숙':'김명숙 실장님','류정구':'류정구 매니저님','유제현':'유제현 호스트'};
const MGR={
  '박해성':{days:[2,4,0,6],wMax:99},
  '김병섭':{days:[0,1,2,3,4,5,6],wMax:99},
  '김명숙':{days:[1,2,3,4,6],wMax:99},
  '류정구':{days:[1,2,3,4,6],wMax:99},
  '유제현':{days:[0,1,2,3,4,5,6],wMax:99},
};
const BLOCKS=[{mgr:'박해성',from:'2026-04-03',to:'2026-04-06'}];
const PWD={'f3':['2791','3727','9572'],'f4':['0129','0324','1121']};
const PWD_BASE={'f3':{date:'2026-03-26',idx:0},'f4':{date:'2026-03-23',idx:2}};

let yr=new Date().getFullYear(),mo=new Date().getMonth()+1;
let settleView='month'; // 'month' or 'week'
let settleWeekOffset=0;
let settleMgrFilter=null; // null=전체, 또는 매니저 이름
let calView='month'; // 'month' or 'week'
let weekOffset=0; // 주간뷰 주차 오프셋
let reservations=JSON.parse(localStorage.getItem('jj_res')||'[]');
let sus=JSON.parse(localStorage.getItem('jj_su')||'{}');
let selDate=null;

const gf=p=>FEE[Math.min(p||0,8)]||50000;
// 날짜별 '미정' 상태
function isMijeong(ds){ return sus['mijeong_'+ds]===true; }
function toggleMijeong(ds){
  sus['mijeong_'+ds]=!isMijeong(ds);
  localStorage.setItem('jj_su',JSON.stringify(sus));
  renderAll();
  if(selDate===ds) rPanel(ds);
}
const fmt=a=>a>0?(a/10000).toFixed(1)+'만원':'-';
const fmtW=a=>a>0?a.toLocaleString()+'원':'-';
const fmtD=ds=>{const d=new Date(ds+'T00:00:00');return `${d.getMonth()+1}/${d.getDate()}(${DAYS[d.getDay()]})`;};
const gs=(d,f)=>sus[`${d}_${f}`]||{persons:0,managers:[],nation:'foreign',laundry:{used:0,wittak:0,self:0}};
const sv=(d,f,v)=>{sus[`${d}_${f}`]=v;localStorage.setItem('jj_su',JSON.stringify(sus));};
const nights=(a,b)=>Math.round((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/(864e5));

// ★ Fix 1: UTC→KST 날짜 변환 (GAS ISO 문자열 → 한국 날짜)
function mkD(s){
  const str=String(s);
  if(/^\d{4}-\d{2}-\d{2}$/.test(str))return str;
  if(str.includes('T')||str.includes('Z')){
    const kst=new Date(new Date(str).getTime()+9*60*60*1000);
    return `${kst.getUTCFullYear()}-${String(kst.getUTCMonth()+1).padStart(2,'0')}-${String(kst.getUTCDate()).padStart(2,'0')}`;
  }
  return str;
}

// ★ Fix 2: GAS floor 값 → f3/f4 정규화 + 3↔4 스왑
function parseFloor(raw){
  const f=String(raw).toLowerCase().trim();
  if(f==='f3'||f==='3'||f==='3층')return 'f4'; // 스왑
  if(f==='f4'||f==='4'||f==='4층')return 'f3'; // 스왑
  return f;
}

// 체크아웃 날짜 순서대로 비번 인덱스 계산
function getPwdIdx(floor, ds){
  const pwds=PWD[floor]||[];
  const base=PWD_BASE[floor];
  if(!base) return 0;
  // 기준일 포함 ~ ds 이전(미포함) 체크아웃 수 카운트
  const count=reservations
    .filter(r=>r.floor===floor && r.checkout>=base.date && r.checkout<ds)
    .length;
  return (base.idx + count) % pwds.length;
}
function calcLaundry(l){
  if(!l)return 0;
  let t=0;
  if(l.wittak>0)t+=l.wittak===1?15000:15000+(l.wittak-1)*7000;
  if(l.self>0)t+=l.self*5000;
  return t;
}

function moCnt(name,ty,tm){
  ty=ty||yr;tm=tm||mo;
  const mStr=`${ty}-${String(tm).padStart(2,'0')}`;
  let n=0;
  Object.keys(sus).forEach(k=>{const[kd]=k.split('_f');if(kd.startsWith(mStr)){const v=sus[k];if(v.managers&&v.managers.includes(name))n++;}});
  return n;
}

function isBlocked(name,ds){return BLOCKS.some(b=>b.mgr===name&&ds>=b.from&&ds<=b.to);}

function wCnt(name,ds){
  const d=new Date(ds+'T00:00:00'),dw=d.getDay();
  const ws=new Date(d.getFullYear(),d.getMonth(),d.getDate()-dw).toISOString().split('T')[0];
  const we=new Date(d.getFullYear(),d.getMonth(),d.getDate()-dw+6).toISOString().split('T')[0];
  let n=0;
  Object.keys(sus).forEach(k=>{const[kd]=k.split('_f');if(kd>=ws&&kd<=we){const v=sus[k];if(v.managers&&v.managers.includes(name))n++;}});
  return n;
}

function avail(name,ds){
  const m=MGR[name];if(!m||isBlocked(name,ds))return false;
  const dow=new Date(ds+'T00:00:00').getDay();
  if(!m.days.includes(dow))return false;
  if(m.wMax&&wCnt(name,ds)>=m.wMax)return false;
  return true;
}

function getWeekendTurn(ds){
  const dow=new Date(ds+'T00:00:00').getDay();
  if(dow!==0&&dow!==6)return null;
  const dim=new Date(yr,mo,0).getDate();
  const weekends=[];
  for(let d=1;d<=dim;d++){
    const s=`${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if([0,6].includes(new Date(s+'T00:00:00').getDay()))weekends.push(s);
  }
  const idx=weekends.indexOf(ds);
  if(idx<0)return null;
  return idx%2===0?'박해성':'김병섭';
}

// 전체 예약에 매니저 자동배정 (이미 지정된 건 유지)
function autoAssignAll(){
  reservations.forEach(r=>{
    const s=gs(r.checkout,r.floor);
    if(s.managers&&s.managers.length>0)return; // 이미 배정된 건 유지
    const sug=suggest(r.checkout);
    if(sug.length>0){
      s.managers=sug;
      sv(r.checkout,r.floor,s);
    }
  });
}

function suggest(ds){
  const dow=new Date(ds+'T00:00:00').getDay();
  if(dow===0||dow===6){
    const turn=getWeekendTurn(ds);
    if(turn&&avail(turn,ds))return[turn];
    const other=turn==='박해성'?'김병섭':'박해성';
    if(avail(other,ds))return[other];
  }
  const p=['박해성','김병섭'].filter(n=>avail(n,ds)).sort((a,b)=>moCnt(a)-moCnt(b));
  if(p.length)return[p[0]];
  const s=['김명숙','류정구'].filter(n=>avail(n,ds));
  if(s.length)return s;
  return[];
}

  const btn=document.getElementById('sync-btn');
  btn.disabled=true;btn.innerHTML='<span class="spinning">🔄</span>';
  document.getElementById('ov').classList.add('show');
  try{
    const r=await fetch(GAS);
    if(!r.ok)throw new Error('서버오류 '+r.status);
    const d=await r.json();
    if(!Array.isArray(d))throw new Error('형식오류');
    const fresh=d.filter(r=>r.checkin&&r.checkout&&r.floor).map(r=>({
      checkin:mkD(r.checkin),
      checkout:mkD(r.checkout),
      floor:parseFloor(r.floor),

    }));

    const freshKeys=new Set(fresh.map(r=>r.checkin+'_'+r.checkout+'_'+r.floor));

    localStorage.setItem('jj_res',JSON.stringify(reservations));

function rCal(){
  const body=document.getElementById('cal-body');
  const fd=new Date(yr,mo-1,1).getDay();
  const dim=new Date(yr,mo,0).getDate();
  const today=new Date().toISOString().split('T')[0];
  const CW=100/7;
  const weeks=[];let week=[];
  for(let i=0;i<fd;i++)week.push(null);
  for(let d=1;d<=dim;d++){week.push(d);if(week.length===7){weeks.push(week);week=[];}}
  if(week.length){while(week.length<7)week.push(null);weeks.push(week);}

  // 전체 예약 기준 (지난 일정도 클릭 가능)
  const coMap={};
  reservations.forEach(r=>{if(!coMap[r.checkout])coMap[r.checkout]=[];coMap[r.checkout].push(r);});
  const mStart=`${yr}-${String(mo).padStart(2,'0')}-01`;
  const mEnd=`${yr}-${String(mo).padStart(2,'0')}-${String(dim).padStart(2,'0')}`;
  let html='';

  weeks.forEach(week=>{
    const wd=week.map(d=>d?`${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`:null);
    const wS=wd.find(d=>d)||mStart;
    const wE=wd.filter(d=>d).slice(-1)[0]||mEnd;
    const bars=[];

    ['f3','f4'].forEach((fl,row)=>{
      reservations.forEach(r=>{
        if(r.floor!==fl)return;
        if(r.checkout<wS||r.checkin>wE)return;

        const ciIdx=wd.findIndex(d=>d===r.checkin); // 이번 주에 체크인?
        const coIdx=wd.findIndex(d=>d===r.checkout); // 이번 주에 체크아웃?
        const ciInWeek=ciIdx>=0;
        const coInWeek=coIdx>=0;

        // left: 체크인이 이번 주면 해당 셀 우측 50%부터, 아니면 주 첫 날 0%부터
        const leftPct=ciInWeek?(ciIdx*CW+CW*0.5):(Math.max(0,wd.findIndex(d=>d&&d>=r.checkin))*CW);
        // right: 체크아웃이 이번 주면 해당 셀 좌측 50%까지, 아니면 주 끝(7*CW=100%)까지
        const rightPct=coInWeek?(coIdx*CW+CW*0.5):(7*CW);
        const width=rightPct-leftPct;
        if(width<=0)return;

        const isCo=!!(coMap[r.checkout]&&coInWeek);
        const top=row*22+2;

        // ★ 에어비앤비 방식:
        // - 체크인 시작: 왼쪽 둥글게
        // - 주 경계로 잘릴 때: 직선 (이어지는 느낌)
        // - 체크아웃 끝: 오른쪽 둥글게
        const radL=ciInWeek?'9px':'0';
        const radR=coInWeek?'9px':'0';
        const rad=`border-radius:${radL} ${radR} ${radR} ${radL};`;

        const n=nights(r.checkin,r.checkout);
        const lbl=ciInWeek?'':(fl==='f3'?`3층 ${n}박`:`4층 ${n}박`);
        const fullLbl=fl==='f3'?`3층 ${n}박`:`4층 ${n}박`;
        // 체크인 주: 텍스트 포함, 이어지는 주: 텍스트 없이 색만
        const txt=ciInWeek?fullLbl:'';
        const star=isCo?`<span style="position:absolute;right:4px;top:0;bottom:0;display:flex;align-items:center;font-size:11px;font-weight:900;text-shadow:0 0 3px rgba(0,0,0,.5)">★</span>`:'';
        bars.push(`<div class="res-bar ${fl}-stay" style="left:${leftPct}%;width:${width}%;top:${top}px;${rad}overflow:visible;">${txt}${star}</div>`);
      });
    });

    let cells='';
    week.forEach((d,i)=>{
      if(!d){cells+=`<div class="cal-cell empty"><div class="day-num"></div></div>`;return;}
      const ds=wd[i];
      const hasCo=!!coMap[ds];
      const hasBlk=BLOCKS.some(b=>ds>=b.from&&ds<=b.to);
      const mij=isMijeong(ds);
      cells+=`<div class="cal-cell${hasCo?' has-checkout':' has-checkout'}${ds===today?' today':''}${mij?' mijeong':''}" onclick="openPanel('${ds}')">
        <div class="day-num">${d}</div>
        ${mij?`<div style="position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:9px;color:#e67e22;font-weight:700">미정</div>`:''}
        ${hasBlk?`<div class="blk-badge">⚠박해성불가</div>`:''}
      </div>`;
    });
    html+=`<div class="cal-week" style="position:relative;">${cells}<div style="position:absolute;left:0;right:0;top:22px;pointer-events:none;">${bars.join('')}</div></div>`;
  });
  body.innerHTML=html;
}

function togM(ds,fl,name){
  if(!avail(name,ds))return;
  const s=gs(ds,fl);
  const pair=name==='김명숙'?'류정구':name==='류정구'?'김명숙':null;
  if(s.managers.includes(name)){
    s.managers=s.managers.filter(m=>m!==name);
    if(pair)s.managers=s.managers.filter(m=>m!==pair);
  }else{
    if(!s.managers.includes(name))s.managers.push(name);
    if(pair&&!s.managers.includes(pair)&&avail(pair,ds))s.managers.push(pair);

  sv(ds,fl,s);if(selDate===ds)rPanel(ds);renderAll();
}

function genK(ds,cos){
  let lines=['안녕하세요✨',''];
  if(cos.length>0) cos.forEach(r=>{
    const s=gs(ds,r.floor);
    const lbl=r.floor==='f3'?'3층':'4층';
    const coTm=r.floor==='f3'?'11:00':'12:00';
    const ciTm=r.floor==='f3'?'15:00':'16:00';
    const n=nights(r.checkin,r.checkout);
    const nat=s.nation==='domestic'?'내국인':'외국인';
    const pwds=PWD[r.floor]||[];
    const pi=getPwdIdx(r.floor,ds);
    const curPwd=pwds[pi]||pwds[0]||'';
    const nxtPwd=pwds[(pi+1)%pwds.length]||'';

    lines.push(`[${lbl} 퇴실 정보]`);
    lines.push(`체크아웃 ${coTm} / ${n}박 / ${s.persons>0?s.persons:'?'}명 (${nat})`);
    if(curPwd) lines.push(`비밀번호 현재 ${curPwd} 변경 ${nxtPwd}`);
    lines.push('');
    lines.push(`[${lbl} 입실 정보]`);
    // 다음 예약 체크인 찾기
    const nextCI=getNextCheckin(ds,r.floor);
    if(nextCI){
      const ciP=sus['ci_persons_'+nextCI.checkin+'_'+r.floor]||0;
      const ciNat=sus['ci_nation_'+nextCI.checkin+'_'+r.floor]||'foreign';
      const ciN=sus['ci_nights_'+nextCI.checkin+'_'+r.floor]||0;
      lines.push(`체크인 ${fmtD(nextCI.checkin)} ${ciTm} / ${ciN>0?ciN+'박 / ':''}${ciP>0?ciP+'명':'?명'} (${ciNat==='domestic'?'내국인':'외국인'})`);
    } else {
      lines.push(`다음 예약 없음`);
    }
    lines.push('');
  });
  // 담당 매니저
  const allM=[...new Set(cos.flatMap(r=>gs(ds,r.floor).managers))];
  lines.push(`담당: ${allM.length?allM.map(m=>MGR_NAMES[m]||m).join(', '):'미지정'}`);
  lines.push('');
  const memo=sus['memo_'+ds];
  if(memo&&memo.trim()){
    let memoNum=1;
    memo.split('\n').forEach(line=>{
      const l=line.trim();
      if(l){
        // 이미 숫자로 시작하면 그대로, 아니면 번호 붙이기
        lines.push(/^\d+\./.test(l)?l:`${memoNum++}. ${l}`);
      } else {
        lines.push(''); // 빈 줄 그대로 유지
      }
    });
  }
  return lines.join('\n');
}

// 해당 날짜 이후 같은 층의 다음 체크인 예약 찾기
function getNextCheckin(ds,floor){
  const future=reservations
    .filter(r=>r.floor===floor&&r.checkin>=ds)
    .sort((a,b)=>a.checkin.localeCompare(b.checkin));
  return future.length?future[0]:null;
}

function setSettleView(v){
  settleView=v;settleWeekOffset=0;settleMgrFilter=null;
  const mb=document.getElementById('settle-month-btn');

  rSettle();
}

function setSettleMgr(name){
  settleMgrFilter=settleMgrFilter===name?null:name;
  rSettle();
}

function rSettle(){
  // 주간뷰면 해당 주 날짜 범위 계산
  let settleStart=null,settleEnd=null;
  if(settleView==='week'){
    const now=new Date();
    // 월요일 기준: getDay()는 일=0,월=1,...토=6
    const dow=now.getDay();
    const diffToMon=(dow===0)?-6:(1-dow);
    const monDate=new Date(now.getFullYear(),now.getMonth(),now.getDate()+diffToMon+settleWeekOffset*7);
    const sunDate=new Date(monDate.getFullYear(),monDate.getMonth(),monDate.getDate()+6);
    // toISOString 대신 로컬 날짜 직접 계산 (UTC 오프셋 문제 방지)
    const toLocal=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    settleStart=toLocal(monDate);
    settleEnd=toLocal(sunDate);
    const st=document.getElementById('set-t');
    if(st){
      const ts=new Date(settleStart+'T00:00:00'),te=new Date(settleEnd+'T00:00:00');
      st.textContent=`${ts.getMonth()+1}/${ts.getDate()}(월) ~ ${te.getMonth()+1}/${te.getDate()}(일)`;
    }
  } else {
    const st=document.getElementById('set-t');if(st)st.textContent=`${yr}년 ${mo}월`;
  }

  // 매니저 탭 렌더
  const mgrTabEl=document.getElementById('mgr-tabs');
  if(mgrTabEl){
    const allMgrs=Object.keys(MGR_NAMES);
    mgrTabEl.innerHTML=`<button onclick="setSettleMgr(null)" style="padding:6px 12px;border:1.5px solid ${settleMgrFilter===null?'var(--text)':'var(--border)'};border-radius:20px;background:${settleMgrFilter===null?'var(--text)':'#fff'};color:${settleMgrFilter===null?'#fff':'var(--muted)'};font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;">전체</button>`
    +allMgrs.map(n=>`<button onclick="setSettleMgr('${n}')" style="padding:6px 12px;border:1.5px solid ${settleMgrFilter===n?'var(--text)':'var(--border)'};border-radius:20px;background:${settleMgrFilter===n?'var(--text)':'#fff'};color:${settleMgrFilter===n?'#fff':'var(--muted)'};font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;">${n}</button>`).join('');
  }
  // 월별 지출 요약 카드 (정산탭 상단)
  const allMonths=[...new Set(reservations.map(r=>{const d=new Date(r.checkout+'T00:00:00');return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}))].sort().reverse();
  const mSumEl=document.getElementById('month-expense-summary');
  if(mSumEl){
    let mHtml='<div style="font-size:13px;font-weight:700;color:var(--muted);margin-bottom:8px">📅 월별 지출 요약</div>';
    mHtml+='<div style="display:flex;flex-direction:column;gap:6px;">';
    allMonths.forEach(ym=>{
      const[y,m]=ym.split('-').map(Number);
      const mCos=getMonthCheckouts(y,m);
      const mCoMap={};mCos.forEach(r=>{if(!mCoMap[r.checkout])mCoMap[r.checkout]=[];mCoMap[r.checkout].push(r);});
      let mClean=0,mWittak=0,mSelf=0;
      Object.entries(mCoMap).forEach(([ds,rs])=>{
        rs.forEach(r=>{
          const s=gs(ds,r.floor);
          if(s.persons>0)mClean+=gf(s.persons);
          const l=s.laundry||{};
          if(l.wittak>0)mWittak+=l.wittak===1?15000:15000+(l.wittak-1)*7000;
          if(l.self>0)mSelf+=l.self*5000;
        });
      });
      const mTotal=mClean+mWittak+mSelf;
      const isCur=(y===yr&&m===mo);
      mHtml+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:${isCur?'#f0fbf4':'#fafaf8'};border-radius:8px;border:1px solid ${isCur?'var(--ok)':'var(--border)'};">
        <span style="font-size:13px;font-weight:${isCur?700:400}">${y}년 ${m}월</span>
        <div style="text-align:right">
          <div style="font-size:14px;font-weight:700;color:${isCur?'var(--ok)':'var(--text)'}">${fmtW(mTotal)}</div>
          <div style="font-size:10px;color:var(--muted)">청소 ${fmtW(mClean)} / 세탁 ${fmtW(mWittak+mSelf)}</div>
        </div>
      </div>`;
    });
    mHtml+='</div>';
    mSumEl.innerHTML=mHtml;
  }
  const cos=settleView==='week'
    ?reservations.filter(r=>r.checkout>=settleStart&&r.checkout<=settleEnd)
    :getMonthCheckouts();
  const coMap={};cos.forEach(r=>{if(!coMap[r.checkout])coMap[r.checkout]=[];coMap[r.checkout].push(r);});
  const cm={};let lw=0,ls=0;
  Object.entries(coMap).forEach(([ds,rs])=>{
    rs.forEach(r=>{
      const s=gs(ds,r.floor);if(!s.persons)return;
      const fee=gf(s.persons);
      let pt=s.managers.filter(m=>m!=='유제현');
      if(pt.includes('김명숙')&&pt.includes('류정구'))pt=['김명숙'];
      const per=pt.length?fee/pt.length:0;

function exportCSV(){
  const cos=settleView==='week'
    ?reservations.filter(r=>r.checkout>=settleStart&&r.checkout<=settleEnd)
    :getMonthCheckouts();
  const coMap={};cos.forEach(r=>{if(!coMap[r.checkout])coMap[r.checkout]=[];coMap[r.checkout].push(r);});

  const rows=[['층','체크인','체크아웃','요일','박수','인원','국적','담당자','사용침구수','청소비','자체세탁비','위탁세탁비','청소비합계','세탁비합계','총합계']];

  Object.keys(coMap).sort().forEach(ds=>{
    coMap[ds].forEach(r=>{
      const s=gs(ds,r.floor);
      const d=new Date(ds+'T00:00:00');
      const ci=new Date(r.checkin+'T00:00:00');
      const lbl=r.floor==='f3'?'3층':'4층';
      const n=nights(r.checkin,r.checkout);
      const nat=s.nation==='domestic'?'내국인':'외국인';
      const mgrs=s.managers.map(m=>MGR_NAMES[m]||m).join('+');
      const cleanFee=s.managers.length===1&&s.managers[0]==='유제현'?0:(s.persons>0?gf(s.persons):0);
      const l=s.laundry||{};
      const bedding=l.used||0;
      const wittak=l.wittak>0?(l.wittak===1?15000:15000+(l.wittak-1)*7000):0;
      const self=l.self>0?l.self*5000:0;
      rows.push([
        lbl,
        `${ci.getMonth()+1}/${ci.getDate()}`,
        `${d.getMonth()+1}/${d.getDate()}`,
        DAYS[d.getDay()],
        n+'박',
        s.persons>0?s.persons+'명':'?명',
        nat,
        mgrs||'미지정',
        bedding,
        cleanFee,
        self,
        wittak,
        cleanFee,
        wittak+self,
        cleanFee+wittak+self
      ]);
    });
  });

  // 합계 행
  let totalClean=0,totalSelf=0,totalWittak=0;
  rows.slice(1).forEach(r=>{totalClean+=r[9];totalSelf+=r[10];totalWittak+=r[11];});
  rows.push(['합계','','','','','','','','',totalClean,totalSelf,totalWittak,totalClean,totalSelf+totalWittak,totalClean+totalSelf+totalWittak]);

  // BOM 추가 (한글 깨짐 방지)
  const bom='﻿';
  const csv=bom+rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const period=settleView==='week'?`${settleStart}_${settleEnd}`:`${yr}년${mo}월`;
  a.href=url;a.download=`진진심_청소정산_${period}.csv`;
  a.click();URL.revokeObjectURL(url);
  showToast('CSV 다운로드 완료 ✓');
}

function toggleSettle(name){
  var el=document.getElementById('sd-'+name);
  if(el) el.classList.toggle('open');
}
function copySettle(){
  const cos=getMonthCheckouts();
  const coMap={};cos.forEach(r=>{if(!coMap[r.checkout])coMap[r.checkout]=[];coMap[r.checkout].push(r);});
  const cm={};let lw=0,ls=0;
  Object.entries(coMap).forEach(([ds,rs])=>{
    rs.forEach(r=>{
      const s=gs(ds,r.floor);if(!s.persons)return;
      const fee=gf(s.persons);let pt=s.managers;
      if(pt.includes('김명숙')&&pt.includes('류정구'))pt=['김명숙'];
      const per=pt.length?fee/pt.length:0;
      pt.forEach(m=>{if(!cm[m])cm[m]=0;cm[m]+=per;});
      const l=s.laundry||{};
      if(l.wittak>0)lw+=l.wittak===1?15000:15000+(l.wittak-1)*7000;
      if(l.self>0)ls+=l.self*5000;
    });
  });
  let lines=[`[${yr}년 ${mo}월 청소 정산]`,``,'[청소비]'];
  Object.entries(cm).forEach(([n,v])=>lines.push(`${MGR_NAMES[n]||n}: ${fmtW(Math.round(v))}`));
  if(lw>0||ls>0){lines.push(``);lines.push('[세탁비]');if(lw>0)lines.push(`위탁(무무배딩): ${fmtW(lw)}`);if(ls>0)lines.push(`자체세탁: ${fmtW(ls)}`);}
  lines.push(``);lines.push(`총 지급: ${fmtW(Math.round(Object.values(cm).reduce((s,v)=>s+v,0)+lw))}`);
  navigator.clipboard.writeText(lines.join('\n')).then(()=>showToast('정산 내역 복사됨 ✓'));
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  ['cal','list','settle'].forEach(id=>document.getElementById('tab-'+id).style.display='none');
  document.getElementById('tab-'+tab).style.display='block';
  document.querySelectorAll('.tab')[{cal:0,list:1,settle:2}[tab]].classList.add('active');
  if(tab==='list')rList();if(tab==='settle')rSettle();if(tab==='cal')renderAll();
}
function changeMonth(d){
  // 정산 주간뷰면 주 이동
  const activeTab=document.querySelector('.tab.active');
  if(activeTab&&activeTab.textContent.includes('정산')&&settleView==='week'){
    settleWeekOffset+=d;rSettle();return;
  }
  mo+=d;if(mo>12){mo=1;yr++;}if(mo<1){mo=12;yr--;}
  closePanel();renderAll();
}

async function cloudSave(){
  const btn=document.getElementById('cloud-save-btn');
  btn.disabled=true;btn.textContent='저장중...';
  try{
    const data=encodeURIComponent(JSON.stringify(sus));
    const r=await fetch(`${GAS}?action=saveSus&data=${data}`);
    const d=await r.json();
    if(d.ok)showToast('☁️ 클라우드 저장 완료 ✓');
    else throw new Error(d.error);
  }catch(e){showToast('저장 실패: '+e.message);}
  finally{btn.disabled=false;btn.textContent='☁️ 저장';}
}

async function cloudLoad(){
  const btn=document.getElementById('cloud-load-btn');
  btn.disabled=true;btn.textContent='불러오는중...';
  try{
    const r=await fetch(`${GAS}?action=loadSus`);
    const d=await r.json();
    if(d.ok){
      sus=JSON.parse(d.data||'{}');
      localStorage.setItem('jj_su',JSON.stringify(sus));
      renderAll();
      showToast('☁️ 클라우드 불러오기 완료 ✓');
    }else throw new Error(d.error);
  }catch(e){showToast('불러오기 실패: '+e.message);}
  finally{btn.disabled=false;btn.textContent='☁️ 불러오기';}
}
